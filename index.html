<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>SZRN OS v1.1</title>

<style>
body {
  margin: 0;
  background: #000;
  color: #0f0;
  font-family: monospace;
}

#input-area {
  position: sticky;
  top: 0;
  background: #111;
  padding: 10px;
  border-bottom: 1px solid #333;
}

#userInput {
  width: 75%;
  height: 60px;
  background: #000;
  color: #0f0;
  border: 1px solid #333;
}

#runBtn {
  width: 23%;
  height: 60px;
  background: #222;
  color: #0f0;
  border: 1px solid #333;
}

#editor {
  width: 100%;
  height: 55vh;
  background: #000;
  color: #0f0;
  border: none;
  padding: 10px;
}

#searchBox {
  width: 100%;
  height: 40px;
  background: #111;
  color: #0f0;
  border: none;
  padding: 5px;
}
</style>
</head>

<body>

<div id="input-area">
  <textarea id="userInput" placeholder="スズに入力..."></textarea>
  <button onclick="runConvert()">変換</button>
</div>

<textarea id="editor"></textarea>

<input id="searchBox" placeholder="検索...">

<script>

async function runConvert() {
  const input = document.getElementById("userInput").value;
  const editor = document.getElementById("editor");

  if (!input.trim()) return;

  try {
    const res = await fetch("https://holy-bush-8fd6.b6sp5wxppr.workers.dev", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ input: input })
    });

    const data = await res.json();

    const output = data.choices[0].message.content;

    editor.value = output + "\n\n" + editor.value;
    localStorage.setItem("szrn_data", editor.value);

  } catch (e) {
    editor.value = "エラー: " + e.message + "\n\n" + editor.value;
  }

  document.getElementById("userInput").value = "";
}

window.onload = function() {
  const saved = localStorage.getItem("szrn_data");
  if (saved) {
    document.getElementById("editor").value = saved;
  }
};

</script>

</body>
</html>
