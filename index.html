<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>スズOS</title>

<style>
body{
  margin:0;
  background:#000;
  color:#0f0;
  font-family:monospace;
  display:flex;
  flex-direction:column;
  height:100vh;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  grid-template-rows:1fr 1fr 1fr;
  gap:10px;
  padding:10px;
  flex:1;
}

.box{
  border:1px solid #0f0;
  padding:10px;
  overflow:auto;
}

.bottom{
  border-top:1px solid #0f0;
  padding:10px;
  display:flex;
  gap:10px;
}

textarea{
  flex:1;
  height:60px;
  background:#111;
  color:#0f0;
}

button{
  padding:10px;
}
</style>
</head>

<body>

<div class="grid">
  <div class="box">🧠 状態<div id="status">待機中</div></div>
  <div class="box">📊 思考<div id="thinking"></div></div>
  <div class="box">📈 成長<div id="growth"></div></div>
  <div class="box">🧬 人格<div id="persona"></div></div>
  <div class="box">📜 ログ<div id="log"></div></div>
  <div class="box">⚙ 監視<div id="monitor"></div></div>
</div>

<div class="bottom">
  <textarea id="input" placeholder="入力"></textarea>
  <button onclick="send()">実行</button>
</div>

<script>

const WORKER_URL = "https://holy-bush-8fd6.b6sp5wxppr.workers.dev";

let lastInput="";
let retryCount=0;

async function send(){

  const input = document.getElementById("input").value;
  lastInput=input;

  const status = document.getElementById("status");

  let dots=0;
  const loading=setInterval(()=>{
    dots=(dots+1)%4;
    status.innerText="送信中"+"●".repeat(dots);
  },300);

  try{

    const res=await fetch(WORKER_URL,{
      method:"POST",
      body:JSON.stringify({input})
    });

    const data=await res.json();

    clearInterval(loading);

    document.getElementById("thinking").innerText=data.reply;
    document.getElementById("growth").innerText=data.growth || "-";
    document.getElementById("persona").innerText=JSON.stringify(data.PERSONA || {});

    addLog("正常",data.reply);

    status.innerText="完了";

    setTimeout(()=>status.innerText="待機中",500);

    retryCount=0;

  }catch(e){

    clearInterval(loading);

    status.innerText="エラー";
    addLog("エラー",e.message);

    retryCount++;
    document.getElementById("monitor").innerText="再試行回数:"+retryCount;
  }
}

function addLog(type,text){
  const log=document.getElementById("log");
  const div=document.createElement("div");
  div.innerText=`[${type}] ${text}`;
  log.prepend(div);
}

document.getElementById("input").addEventListener("keydown",e=>{
  if(e.key==="Enter"){
    e.preventDefault();
    send();
  }
});

</script>

</body>
</html>
