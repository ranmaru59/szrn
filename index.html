<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>SZRN OS</title>

<style>
body {
  margin: 0;
  background: #000;
  color: #0f0;
  font-family: monospace;
}

/* 入力エリア */
#input-area {
  position: sticky;
  top: 0;
  background: #111;
  padding: 10px;
  border-bottom: 1px solid #333;
  z-index: 999;
}

#userInput {
  width: 80%;
  height: 60px;
  background: #000;
  color: #0f0;
  border: 1px solid #333;
  padding: 5px;
}

#runBtn {
  height: 60px;
  width: 18%;
  background: #222;
  color: #0f0;
  border: 1px solid #333;
}

/* メインエリア */
#editor {
  width: 100%;
  height: 60vh;
  background: #000;
  color: #0f0;
  border: none;
  padding: 10px;
}

/* 検索 */
#searchBox {
  width: 100%;
  height: 40px;
  background: #111;
  color: #0f0;
  border: none;
  padding: 5px;
}
</style>
</head>

<body>

<!-- 入力UI -->
<div id="input-area">
  <textarea id="userInput" placeholder="ここに入力..."></textarea>
  <button id="runBtn" onclick="runConvert()">変換</button>
</div>

<!-- 保存エリア -->
<textarea id="editor"></textarea>

<!-- 検索 -->
<input id="searchBox" placeholder="検索..." onkeydown="handleSearch(event)">

<script>
/* 入力 → 保存 */
function runConvert() {
  const input = document.getElementById("userInput").value;
  const editor = document.getElementById("editor");

  if (!input.trim()) return;

  editor.value = input + "\n\n" + editor.value;
  localStorage.setItem("szrn_data", editor.value);

  document.getElementById("userInput").value = "";
}

/* Enter送信 */
document.getElementById("userInput").addEventListener("keydown", function(e) {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    runConvert();
  }
});

/* 検索 */
let matches = [];
let currentIndex = 0;

function handleSearch(e) {
  if (e.key === "Enter") {
    const keyword = e.target.value;
    const text = document.getElementById("editor").value;

    matches = [];
    currentIndex = 0;

    let index = text.indexOf(keyword);
    while (index !== -1) {
      matches.push(index);
      index = text.indexOf(keyword, index + 1);
    }

    if (matches.length > 0) {
      jumpToMatch();
    }
  }
}

function jumpToMatch() {
  const editor = document.getElementById("editor");
  editor.focus();

  const pos = matches[currentIndex];
  editor.setSelectionRange(pos, pos + 10);

  currentIndex = (currentIndex + 1) % matches.length;
}

/* 初期ロード */
window.onload = function() {
  const saved = localStorage.getItem("szrn_data");
  if (saved) {
    document.getElementById("editor").value = saved;
  }
};
</script>

</body>
</html>
