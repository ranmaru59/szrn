<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>スズOS</title>

<style>
body{
  background:#000;
  color:#0f0;
  font-family:monospace;
}

.box{
  border:1px solid #0f0;
  margin:20px;
  padding:20px;
}

textarea{
  width:100%;
  height:100px;
  background:#111;
  color:#0f0;
}

button{
  margin:10px;
  padding:10px;
}

.status{
  color:#0f0;
}

.error{
  color:red;
}
</style>
</head>

<body>

<div class="box">
🧠 状態
<div id="status">待機中</div>
</div>

<div class="box">
📊 思考
<div id="thinking"></div>
</div>

<div class="box">
📈 成長
<div id="growth"></div>
</div>

<div class="box">
🧬 人格
<div id="persona"></div>
</div>

<div class="box">
📜 ログ
<div id="log"></div>
</div>

<div class="box">
<textarea id="input" placeholder="入力"></textarea>
<button onclick="send()">実行</button>
<button onclick="retry()">再試行</button>
</div>

<script>

let lastInput="";
let retryCount=0;

function sleep(ms){
  return new Promise(r=>setTimeout(r,ms));
}

async function send(){

  const input = document.getElementById("input").value;
  lastInput = input;

  const status = document.getElementById("status");

  let dots = 0;
  let running = true;

  const loading = setInterval(()=>{
    dots = (dots+1)%4;
    status.innerText = "送信中" + "●".repeat(dots);
  },300);

  try{

    const res = await fetch("あなたのWorkerURL",{
      method:"POST",
      body:JSON.stringify({input})
    });

    const data = await res.json();

    clearInterval(loading);

    document.getElementById("thinking").innerText = data.reply;
    document.getElementById("growth").innerText = data.growth;
    document.getElementById("persona").innerText = JSON.stringify(data.PERSONA);

    addLog("正常", data.reply);

    status.innerText = "完了";

    setTimeout(()=>{
      status.innerText = "待機中";
    },500);

    retryCount=0;

  }catch(e){

    clearInterval(loading);

    status.innerText = "エラー";
    status.className="error";

    addLog("エラー", e.message);

    retryCount++;

  }
}

function retry(){
  if(lastInput){
    send();
  }
}

function addLog(type,text){

  const log = document.getElementById("log");

  const div = document.createElement("div");

  div.innerText = `[${type}] ${text}`;

  log.prepend(div);

}

document.getElementById("input").addEventListener("keydown",function(e){
  if(e.key==="Enter"){
    e.preventDefault();
    send();
  }
});

</script>

</body>
</html>
