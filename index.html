<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body{background:#000;color:#0f0;font-family:sans-serif}
.card{border:1px solid #0f0;margin:10px;padding:10px}
textarea{width:100%;height:120px}
button{padding:10px;margin:5px}
</style>
</head>

<body>

<div class="card">
<h3>🧠 状態</h3>
<div id="decision"></div>
<div id="score"></div>
<div id="persona"></div>
</div>

<div class="card">
<h3>📊 思考</h3>
<canvas id="chart"></canvas>
</div>

<div class="card">
<h3>📈 成長</h3>
<canvas id="growthChart"></canvas>
</div>

<div class="card">
<h3>🧬 人格</h3>
<canvas id="personaChart"></canvas>
</div>

<div class="card">
<h3>🛠 改善</h3>
<pre id="suggestion"></pre>
</div>

<div class="card">
<h3>📜 ログ</h3>
<textarea id="log"></textarea>
</div>

<button onclick="run('テスト')">実行</button>
<button onclick="startVoice()">🎤音声</button>

<script>
const URL="holy-bush-8fd6.b6sp5wxppr.workers.dev";

async function run(input){
  const res = await fetch(URL,{
    method:"POST",
    body: JSON.stringify({input})
  });

  const d = await res.json();

  decision.innerText=d.decision;
  score.innerText="score:"+d.score;
  persona.innerText=d.personaScore<0.6?"⚠️逸脱":"正常";

  drawChart(d.weights);
  drawGrowth(d.growth);
  drawPersona(d.personaLog);

  suggestion.innerText=(d.suggestion||[]).join("\n");
  log.value=JSON.stringify(d.logs,null,2);

  speak(d.decision);
}

// 音声
const rec=new(window.SpeechRecognition||window.webkitSpeechRecognition)();
rec.lang="ja-JP";
function startVoice(){rec.start();}
rec.onresult=e=>run(e.results[0][0].transcript);

// 音声出力
function speak(t){
  const u=new SpeechSynthesisUtterance(t);
  u.lang="ja-JP";
  speechSynthesis.speak(u);
}

// グラフ
function drawChart(w){
  new Chart(chart,{type:"radar",
    data:{labels:Object.keys(w),datasets:[{data:Object.values(w)}]}})
}

function drawGrowth(g){
  new Chart(growthChart,{
    type:"line",
    data:{labels:g.map(x=>""),datasets:[{data:g.map(x=>x.score)}]}
  })
}

function drawPersona(p){
  new Chart(personaChart,{
    type:"line",
    data:{labels:p.map(x=>""),datasets:[{data:p.map(x=>x.score)}]},
    options:{scales:{y:{min:0,max:1}}}
  })
}
</script>

</body>
</html>
