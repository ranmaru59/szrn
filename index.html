<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>スズOS</title>

<style>
body{
  margin:0;
  background:#000;
  color:#0f0;
  font-family:monospace;
}

.container{
  display:flex;
  flex-direction:column;
  gap:10px;
  padding:10px;
}

.box{
  border:1px solid #0f0;
  padding:10px;
}

h3{
  margin:0 0 5px 0;
  font-size:14px;
}

#log{
  max-height:150px;
  overflow:auto;
}

.bottom{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  display:flex;
  gap:10px;
  padding:10px;
  background:#000;
  border-top:1px solid #0f0;
}

textarea{
  flex:1;
  height:60px;
  background:#111;
  color:#0f0;
}

button{
  width:80px;
}
</style>
</head>

<body>

<div class="container">

<div class="box"><h3>🧠 状態</h3><div id="status">待機中</div></div>
<div class="box"><h3>📊 思考</h3><div id="thinking"></div></div>
<div class="box"><h3>📈 成長</h3><div id="growth"></div></div>
<div class="box"><h3>🧬 人格</h3><div id="persona"></div></div>
<div class="box"><h3>📜 ログ</h3><div id="log"></div></div>
<div class="box"><h3>⚙ 監視</h3><div id="monitor"></div></div>

</div>

<div class="bottom">
  <textarea id="input" placeholder="入力"></textarea>
  <button onclick="send()">実行</button>
</div>

<script>

const WORKER_URL = "https://holy-bush-8fd6.b6sp5wxppr.workers.dev";

let retryCount=0;

async function send(){

  const input = document.getElementById("input").value;
  const status = document.getElementById("status");

  let dots=0;
  const loading=setInterval(()=>{
    dots=(dots+1)%4;
    status.innerText="送信中"+"●".repeat(dots);
  },300);

  try{

    const res=await fetch(WORKER_URL,{
      method:"POST",
      headers:{
        "Content-Type":"application/json"
      },
      body:JSON.stringify({input})
    });

    const data=await res.json();

    clearInterval(loading);

    document.getElementById("thinking").innerText=data.reply;
    document.getElementById("growth").innerText=data.growth || "-";

    addLog("正常",data.reply);

    status.innerText="完了";
    setTimeout(()=>status.innerText="待機中",500);

    retryCount=0;

  }catch(e){

    clearInterval(loading);

    status.innerText="エラー";
    addLog("エラー",e.message);

    retryCount++;
    document.getElementById("monitor").innerText="再試行回数:"+retryCount;
  }
}

function addLog(type,text){
  const log=document.getElementById("log");
  const div=document.createElement("div");
  div.innerText=`[${type}] ${text}`;
  log.prepend(div);
}

document.getElementById("input").addEventListener("keydown",e=>{
  if(e.key==="Enter"){
    e.preventDefault();
    send();
  }
});

</script>

</body>
</html>
