<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SZRN OS</title>

<style>
body {
  margin: 0;
  background: #000;
  color: #0f0;
  font-family: monospace;
  font-size: 18px;
}

#input-area {
  position: sticky;
  top: 0;
  background: #111;
  padding: 10px;
  border-bottom: 1px solid #333;
  display: flex;
  gap: 8px;
}

#userInput {
  flex: 1;
  height: 60px;
  font-size: 18px;
  background: #000;
  color: #0f0;
  border: 1px solid #333;
}

#runBtn {
  width: 90px;
  font-size: 18px;
  background: #222;
  color: #0f0;
  border: 1px solid #333;
}

#editor {
  width: 100%;
  height: 70vh;
  font-size: 16px;
  background: #000;
  color: #0f0;
  border: none;
  padding: 10px;
  white-space: pre-wrap;
}
</style>
</head>

<body>

<div id="input-area">
  <textarea id="userInput" placeholder="スズに入力"></textarea>
  <button id="runBtn" onclick="runConvert()">実行</button>
</div>

<textarea id="editor"></textarea>

<script>
async function runConvert() {

  const input = document.getElementById("userInput").value;
  const editor = document.getElementById("editor");

  if (!input.trim()) return;

  editor.value = "実行中...\n\n" + editor.value;

  try {
    const res = await fetch("https://holy-bush-8fd6.b6sp5wxppr.workers.dev", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ input: input })
    });

    const raw = await res.json();

    let output;

    if (raw.data?.choices?.[0]) {
      output = raw.data.choices[0].message.content;
    } 
    else if (raw.data?.error) {
      output = "APIエラー:\n" + JSON.stringify(raw.data.error, null, 2);
    } 
    else if (raw.error) {
      output = "通信エラー:\n" + raw.error;
    } 
    else {
      output = "不明レスポンス:\n" + JSON.stringify(raw, null, 2);
    }

    editor.value = output + "\n\n---\n\n" + editor.value;

  } catch (e) {
    editor.value = "通信例外:\n" + e.message + "\n\n" + editor.value;
  }

  document.getElementById("userInput").value = "";
}

// 保存復元
window.onload = function () {
  const saved = localStorage.getItem("szrn_data");
  if (saved) {
    document.getElementById("editor").value = saved;
  }
};

// 保存処理
document.getElementById("editor").addEventListener("input", function () {
  localStorage.setItem("szrn_data", this.value);
});
</script>

</body>
</html>
